<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PROXYVIP - Active Key</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#0a0a2e,#16213e,#0f3460);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;color:#fff}
        .card{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:24px;padding:32px;max-width:450px;width:100%}
        input{width:100%;padding:14px;border-radius:12px;border:none;margin:10px 0}
        button{width:100%;padding:14px;background:#ff00ff;border:none;border-radius:12px;color:#fff;font-weight:bold;cursor:pointer}
        .status{padding:10px;margin-top:10px;border-radius:8px}
        .active{background:#10b981}
        .expired{background:#ef4444}
    </style>
</head>
<body>
    <div class="card">
        <h1>PROXYVIP VN</h1>
        <p>IP của bạn: <strong id="ip">...</strong></p>
        
        <input type="text" id="license" placeholder="Key của bạn">
        <button id="submitBtn">GỬI KEY ACTIVE</button>
        <button id="clearBtn">XÓA KEY</button>
        
        <div id="statusPanel" style="display:none" class="status"></div>
        <div id="infoPanel" style="margin-top:10px"></div>
    </div>

    <script>
        const ipEl = document.getElementById('ip');
        const licenseInput = document.getElementById('license');
        const submitBtn = document.getElementById('submitBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusPanel = document.getElementById('statusPanel');
        const infoPanel = document.getElementById('infoPanel');

        async function getIP() {
            const res = await fetch('/whoami');
            const data = await res.json();
            ipEl.textContent = data.ip;
            return data.ip;
        }
        getIP();

        async function loadKeyStatus(key) {
            if (!key) return;
            const res = await fetch(`/api/key-status?key=${key}`);
            const data = await res.json();
            
            if (data.active && data.ip_whitelisted) {
                statusPanel.textContent = '✅ Key hoạt động - IP đã active';
                statusPanel.className = 'status active';
            } else if (data.active) {
                statusPanel.textContent = '⚠️ Key còn hạn nhưng chưa active IP';
                statusPanel.className = 'status';
            } else {
                statusPanel.textContent = '❌ Key không tồn tại hoặc đã hết hạn';
                statusPanel.className = 'status expired';
            }
            statusPanel.style.display = 'block';
            
            infoPanel.innerHTML = `
                <div>Loại key: ${data.key_type || '---'}</div>
                <div>Ngày tạo: ${data.created_at ? new Date(data.created_at).toLocaleString('vi-VN') : '---'}</div>
                <div>Hết hạn: ${data.expires_at ? new Date(data.expires_at * 1000).toLocaleString('vi-VN') : '---'}</div>
            `;
        }

        const savedKey = localStorage.getItem('proxy_key');
        if (savedKey) {
            licenseInput.value = savedKey;
            loadKeyStatus(savedKey);
        }

        submitBtn.onclick = async () => {
            const key = licenseInput.value.trim();
            if (!key) return alert('Nhập key');
            
            const ip = await getIP();
            const res = await fetch('/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({key, ip, device_id: 'mobile'})
            });
            const data = await res.json();
            
            if (res.ok) {
                localStorage.setItem('proxy_key', key);
                alert('Active thành công!');
                loadKeyStatus(key);
            } else {
                alert(data.message || 'Lỗi');
            }
        };
        
        clearBtn.onclick = () => {
            localStorage.removeItem('proxy_key');
            licenseInput.value = '';
            statusPanel.style.display = 'none';
            infoPanel.innerHTML = '';
            alert('Đã xóa key');
        };
    </script>
</body>
</html>

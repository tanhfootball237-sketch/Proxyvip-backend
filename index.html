
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIM Ports</title>
    <script>
      document.addEventListener("contextmenu", e => e.preventDefault());
      document.addEventListener("keydown", e => {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) || (e.ctrlKey && e.key === "u")) {
          e.preventDefault();
        }
      });
      document.addEventListener("DOMContentLoaded", function() {
        if (document.body) document.body.style.webkitUserSelect = "none";
      });
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Arial Black', Arial, sans-serif;
        background: linear-gradient(135deg, #0a0a2e 0%, #16213e 25%, #0f3460 50%, #533483 75%, #e94560 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .retro-background { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
      .y2k-grid { position: absolute; inset: 0; background-image: radial-gradient(circle at 25% 25%, rgba(255,0,255,.1) 0%, transparent 50%), radial-gradient(circle at 75% 75%, rgba(0,255,255,.1) 0%, transparent 50%); }
      .grid-dots { position: absolute; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,0,.3) 1px, transparent 0); background-size: 40px 40px; animation: gridMove 20s linear infinite; }
      .scan-line { position: absolute; width: 100%; height: 2px; animation: scanMove 8s linear infinite; }
      .scan-1 { top: 20%; background: linear-gradient(90deg, transparent, rgba(0,255,255,.8), transparent); }
      .scan-2 { top: 50%; animation-delay: -3s; background: linear-gradient(90deg, transparent, rgba(255,0,255,.8), transparent); }
      .scan-3 { top: 80%; animation-delay: -6s; background: linear-gradient(90deg, transparent, rgba(255,255,0,.8), transparent); }
      .login-container { width: 100%; max-width: 900px; position: relative; z-index: 1; }
      .box {
        width: 100%;
        background: linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.05));
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 34px;
        box-shadow: 0 25px 50px rgba(0,0,0,.3), 0 10px 30px rgba(255,0,255,.1), inset 0 1px 0 rgba(255,255,255,.2);
        position: relative;
        overflow: hidden;
      }
      .box::before { content:''; position:absolute; inset:0; background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff00ff); background-size: 400% 400%; animation: chromeShift 6s ease-in-out infinite; z-index: -2; }
      .box::after { content:''; position:absolute; inset:2px; background: linear-gradient(145deg, rgba(16,16,40,.95), rgba(32,32,64,.9)); border-radius:22px; z-index:-1; }
      h2 { text-align:center; margin-bottom: 8px; font-size: 28px; letter-spacing: 1px; }
      .sub { text-align:center; font-size: 13px; opacity: .85; margin-bottom: 14px; text-transform: uppercase; }
      .btn {
        display: inline-block; padding: 10px 20px; border-radius: 10px; border: none;
        background: linear-gradient(45deg, #b56f00, #d14a97, #8a3dd1, #b56f00);
        background-size: 300% 300%; animation: shift 4s ease infinite;
        color: #fff; font-weight: 900; cursor: pointer; text-decoration: none;
        margin-top: 12px;
      }
      .btn:hover { opacity: 0.9; }
      .btn-secondary {
        background: linear-gradient(45deg, #4a5568, #718096, #4a5568);
        background-size: 300% 300%; animation: shift 4s ease infinite;
      }
      table {
        width: 100%; border-collapse: collapse; margin-top: 16px;
      }
      th, td {
        padding: 12px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.15);
        font-size: 13px;
      }
      th {
        background: rgba(0,0,0,.3); font-weight: 900; letter-spacing: 1px;
        text-transform: uppercase;
      }
      tr:hover { background: rgba(255,255,255,.05); }
      .status-hoat_dong { color: #4ade80; font-weight: bold; }
      .status-bao_tri { color: #f87171; font-weight: bold; }
      .muted { opacity: .7; font-size: 12px; }
      .loading { text-align: center; padding: 40px; opacity: .7; }
      .error { color: #fda4af; text-align: center; padding: 20px; }
      .back-link {
        display: block; text-align: center; margin-top: 16px; color: #38bdf8;
        text-decoration: none; font-size: 13px;
      }
      .back-link:hover { text-decoration: underline; }
      @keyframes shift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
      @keyframes gridMove { 0% { transform: translate(0,0);} 100% { transform: translate(40px,40px);} }
      @keyframes scanMove { 0% { left:-100%; opacity:0;} 10% {opacity:1;} 90% {opacity:1;} 100% { left:100%; opacity:0;} }
      @keyframes chromeShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
      @media (max-width: 768px) {
        .login-container { max-width: 100%; }
        table { font-size: 11px; }
        th, td { padding: 8px 6px; }
      }
    </style>
  </head>
  <body>
    <div class="retro-background">
      <div class="y2k-grid">
        <div class="grid-dots"></div>
        <div class="scan-line scan-1"></div>
        <div class="scan-line scan-2"></div>
        <div class="scan-line scan-3"></div>
      </div>
    </div>

    <div class="login-container">
    <div class="box">
      <h2>IP/PORT PROXY</h2>
      <div class="sub">Danh sách IP/PORT Proxy</div>

      <button class="btn" onclick="location.reload()">Tải lại</button>
      <a href="/" class="btn btn-secondary">Quay lại</a>

      <div id="loading" class="loading">Đang tải dữ liệu...</div>
      <div id="error" class="error" style="display:none;"></div>
      <div id="tableWrap" style="overflow-x:auto; margin-top:16px; display:none;">
        <table>
          <thead>
            <tr>
              <th>STT</th>
              <th>IP</th>
              <th>Port</th>
              <th>Loại proxy</th>
              <th>Link .pem</th>
              <th>Trạng thái</th>
            </tr>
          </thead>
          <tbody id="aim-tbody"></tbody>
        </table>
      </div>
    </div>
    </div>

    <script>
      const tbody = document.getElementById('aim-tbody');
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const tableWrapEl = document.getElementById('tableWrap');

      function fmtDate(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        return d.toLocaleString('vi-VN');
      }

      function renderTable(items) {
        tbody.innerHTML = '';
        items.forEach((item, idx) => {
          const tr = document.createElement('tr');
          const statusClass = item.status === 'hoat_dong' ? 'status-hoat_dong' : 'status-bao_tri';
          tr.innerHTML = `
            <td>${idx + 1}</td>
            <td class="clickable" data-copy="${item.ip || ''}" title="Nhấn để sao chép">${item.ip || '-'}</td>
            <td class="clickable" data-copy="${item.port || ''}" title="Nhấn để sao chép">${item.port || '-'}</td>
            <td>${item.proxy_type || '-'}</td>
            <td><a href="${item.link_pem || '#'}" target="_blank" style="color:#38bdf8">Link</a></td>
            <td class="${statusClass}">${item.status === 'hoat_dong' ? 'Hoạt động' : 'Bảo trì'}</td>
          `;
          tbody.appendChild(tr);
        });

        // Add click-to-copy functionality
        tbody.querySelectorAll('.clickable').forEach(cell => {
          cell.style.cursor = 'pointer';
          cell.addEventListener('click', async () => {
            const text = cell.getAttribute('data-copy');
            try {
              await navigator.clipboard.writeText(text);
              const original = cell.textContent;
              cell.textContent = 'Đã sao chép!';
              cell.style.background = 'rgba(0,255,136,0.2)';
              setTimeout(() => {
                cell.textContent = original;
                cell.style.background = '';
              }, 1500);
            } catch (err) {
              alert('Sao chép thất bại: ' + err);
            }
          });
        });
      }

      async function loadAimPorts() {
        try {
          loadingEl.style.display = 'block';
          errorEl.style.display = 'none';
          tableWrapEl.style.display = 'none';
          const res = await fetch('/api/aim-ports');
          if (res.status === 401 || res.status === 302) {
            window.location.href = '/reset-key?source=v3';
            return;
          }
          const data = await res.json();
          if (!res.ok || data.message) {
            throw new Error(data.message || 'Lỗi tải dữ liệu');
          }
          const items = data.items || [];
          loadingEl.style.display = 'none';
          if (items.length === 0) {
            errorEl.textContent = 'Chưa có AIM ports nào.';
            errorEl.style.display = 'block';
          } else {
            renderTable(items);
            tableWrapEl.style.display = 'block';
          }
        } catch (e) {
          loadingEl.style.display = 'none';
          errorEl.textContent = 'Không thể tải dữ liệu: ' + e.message;
          errorEl.style.display = 'block';
        }
      }

      loadAimPorts();
    </script>
  </body>
</html>
